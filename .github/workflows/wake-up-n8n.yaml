name: Wake Up n8n

on:
  workflow_dispatch:
  schedule:
  # 6 AM IST (00:30 UTC)
  - cron: '30 0 * * *'
  # 9 PM IST (15:30 UTC)
  - cron: '40 15 * * *'

jobs:
  wake-up:
    runs-on: ubuntu-latest

    steps:
      - name: Install OpenShift CLI
        uses: redhat-actions/oc-installer@v1

      - name: Login to OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify

      - name: Select project
        run: |
          oc project ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Restart Deployment (Safe Way)
        run: |
          echo "Scaling down..."
          oc scale deployment n8n --replicas=0 -n ${{ secrets.OPENSHIFT_NAMESPACE }}

          echo "Waiting for pods to terminate..."
          sleep 15

          echo "Scaling up..."
          oc scale deployment n8n --replicas=1 -n ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Wait for rollout
        run: |
          oc rollout status deployment/n8n -n ${{ secrets.OPENSHIFT_NAMESPACE }}